<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rețetar Produs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { padding-top: 20px; }</style>
</head>
<body>

<div class="container">
    
    <div class="mb-4">
        <a href="/products" class="btn btn-outline-secondary">&larr; Înapoi la Produse</a>
    </div>

    <div class="card mb-4 border-primary">
        <div class="card-header bg-primary text-white">
            <h4 class="m-0">Rețetar pentru: <span th:text="${product.name}" class="fw-bold">Masa</span></h4>
        </div>
        <div class="card-body">
            <p><strong>Descriere:</strong> <span th:text="${product.description}">...</span></p>
        </div>
    </div>

    <div class="row">
        
        <div class="col-md-4">
            <div class="card shadow-sm bg-light">
                <div class="card-body">
                    <h5 class="card-title text-success">Adaugă Componentă</h5>
                    <hr>
                    
                    <form action="/products/bom/add" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">

                        <div class="mb-3">
                            <label class="fw-bold">Alege Componenta</label>
                            <select name="componentId" class="form-select" required>
                                <option value="" disabled selected>-- Selectează --</option>
                                <option th:each="comp : ${allComponents}" 
                                        th:value="${comp.id}" 
                                        th:text="${comp.name + ' (' + comp.unit + ')'}">
                                    Surub
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold">Cantitate</label>
                            <input type="number" name="quantity" step="0.01" class="form-control" required placeholder="0.00">
                        </div>

                        <button type="submit" class="btn btn-success w-100">Adaugă în Rețetă</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h5 class="text-secondary">Componente Incluse</h5>
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Componentă</th>
                        <th>Cantitate</th>
                        <th>UM</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${bomList}">
                        <td th:text="${item.component.name}">Surub</td>
                        <td th:text="${item.quantity}" class="fw-bold text-center">4</td>
                        <td th:text="${item.component.unit}">buc</td>
                        <td class="text-center">
                            <a th:href="@{/products/bom/remove/{id}(id=${item.id})}" 
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Scoți componenta din rețetă?')">
                                Elimină
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${bomList.empty}">
                        <td colspan="4" class="text-center text-muted">Rețetarul este gol. Adaugă componente din stânga.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
