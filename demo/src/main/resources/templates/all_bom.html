<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista Completa BOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { padding-top: 20px; }</style>
</head>
<body>

<div class="container">

    <div class="mb-4">
        <a href="/products" class="btn btn-outline-primary">Produse</a>
        <a href="/components" class="btn btn-outline-primary">Componente</a>
        
        <a href="/bom/all" class="btn btn-dark ms-2">BOM Global</a>
        
        <a href="/" class="btn btn-outline-secondary ms-2">Acasă</a>
    </div>

    <div class="mb-3">
        <h3>Toate Legăturile din Bază (BOM Global)</h3>
    </div>

    <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Produs</th>
                <th>Cod Componentă</th> <th>Componentă</th>
                <th>Cantitate</th>
                <th>UM</th>
                <th>Cost Componentă</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="link : ${allLinks}">
                <td th:text="${link.product.name}" class="fw-bold">Masa</td>
                
                <td th:text="${link.component.code}" class="text-secondary fw-semibold">C001</td>
                
                <td th:text="${link.component.name}">Picior</td>
                
                <td th:text="${link.quantity}" class="text-center text-primary fw-bold">4.0</td>
                
                <td th:text="${link.component.unit}">buc</td>

                <td th:text="${link.component.unitCost} + ' RON'">10 RON</td>
            </tr>
            
            <tr th:if="${allLinks.empty}">
                <td colspan="6" class="text-center text-muted">Nu există nicio legătură definită.</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
