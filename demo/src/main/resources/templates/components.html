<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lista Componente</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	padding-top: 20px;
}
</style>
</head>
<body>

	<div class="container">

		<div class="container mb-4">
			<a href="/products" class="btn btn-outline-primary">Produse</a> <a
				href="/components" class="btn btn-primary">Componente</a> <a
				href="/bom/all" class="btn btn-outline-dark ms-2">BOM Global</a>
		</div>

		<div class="row">
			<div class="col-md-12">
				<h3 class="text-info">Gestiune Componente</h3>

				<a href="/components/new" class="btn btn-success mb-3"> Adaugă
					Componentă Nouă </a>

				<table class="table table-bordered table-striped table-hover">
					<thead class="table-dark">
						<tr>
							<th>ID</th>
							<th>Cod</th>
							<th>Nume</th>
							<th>Cost Unitar</th>
							<th>Stoc</th>
							<th>Acțiuni</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="comp : ${components}">
							<td th:text="${comp.id}">1</td>
							<td th:text="${comp.code}">C-001</td>
							<td th:text="${comp.name}">Surub</td>
							<td th:text="${comp.unitCost}">0.5</td>

							<td th:text="${comp.stock}"
								th:class="${comp.stock < 10} ? 'text-danger fw-bold' : ''">
								100</td>

							<td><a th:href="@{/components/edit/{id}(id=${comp.id})}"
								class="btn btn-sm btn-primary"> Edit </a> <a
								th:href="@{/components/delete/{id}(id=${comp.id})}"
								class="btn btn-sm btn-danger"
								onclick="return confirm('Sigur vrei să ștergi?')"> Delete </a></td>
						</tr>

						<tr th:if="${components.empty}">
							<td colspan="6" class="text-center">Nu există componente.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
