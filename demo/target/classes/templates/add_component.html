<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Adaugă Componentă</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>

	<div class="container mt-5">
		<div class="row">
			<div class="col-md-6 offset-md-3">

				<h3 class="text-info mb-4">Detalii Componentă</h3>

				<form th:action="@{/components/save}" th:object="${component}"
					method="post" class="card p-4 shadow-sm bg-light">
					<div th:if="${error}" class="alert alert-danger" role="alert"
						style="color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: 10px; margin-bottom: 15px; border-radius: 4px;">
						<span th:text="${error}"></span>
					</div>

					<input type="hidden" th:field="*{id}" /> <input type="hidden"
						name="active" value="1">

					<div class="mb-3">
						<label class="fw-bold">Cod Componentă</label> <input type="text"
							class="form-control" th:field="*{code}" placeholder="Ex: R-100"
							required />
					</div>

					<div class="mb-3">
						<label class="fw-bold">Nume Componentă</label> <input type="text"
							class="form-control" th:field="*{name}"
							placeholder="Ex: Rezistor 10k" required />
					</div>

					<div class="mb-3">
						<label class="fw-bold">Unitate de Măsură</label> <select
							class="form-select" th:field="*{unit}" required>
							<option value="" disabled selected>-- Selectează --</option>
							<option value="buc">buc (Bucată)</option>
							<option value="kg">kg (Kilogram)</option>
							<option value="m">m (Metru)</option>
							<option value="l">l (Litru)</option>
							<option value="set">set (Set)</option>
							<option value="cutie">cutie</option>
						</select>
					</div>

					<div class="mb-3">
						<label class="fw-bold">Cost Unitar (RON)</label> <input
							type="number" step="0.0001" class="form-control"
							th:field="*{unitCost}" required />
					</div>

					<div class="mb-3">
						<label class="fw-bold">Stoc</label> <input type="number"
							class="form-control" th:field="*{stock}" required />
					</div>

					<div class="d-grid gap-2">
						<button type="submit" class="btn btn-success">Salvează</button>
						<a href="/components" class="btn btn-secondary">Renunță</a>
					</div>

				</form>
			</div>
		</div>
	</div>

</body>
</html>
