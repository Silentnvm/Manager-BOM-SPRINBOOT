<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Formular Produs</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>
<body>

	<div class="container mt-5">
		<div class="row">
			<div class="col-md-6 offset-md-3">

				<h3 class="text-primary">Detalii Produs</h3>

				<form role="form" th:action="@{/products/save}"
					th:object="${product}" method="post"
					class="border p-4 shadow-sm bg-light">
					<div th:if="${error}" class="alert alert-danger">
						<p th:text="${error}"></p>
					</div>

					<input type="hidden" th:field="*{id}" />

					<div class="mb-3">
						<label>Nume Produs</label> <input type="text" class="form-control"
							th:field="*{name}" required />
					</div>

					<div class="mb-3">
						<label>Descriere</label> <input type="text" class="form-control"
							th:field="*{description}" />
					</div>

					<div class="mb-3">
						<label>Categorie</label> <select class="form-control"
							th:field="*{category}">
							<option value="General">General</option>
							<option value="Electronice">Electronice</option>
							<option value="IT">IT</option>
							<option value="Materie Prima">Materie Prima</option>
						</select>
					</div>

					<div class="mb-3">
						<label>Preț</label> <input type="number" step="0.01"
							class="form-control" th:field="*{price}" required />
					</div>

					<div class="mb-3">
						<label>Stoc</label> <input type="number" class="form-control"
							th:field="*{stock}" required />
					</div>

					<input type="hidden" name="active" value="1">

					<button type="submit" class="btn btn-primary">Salvează</button>
					<a href="/products" class="btn btn-secondary">Anulează</a>

				</form>
			</div>
		</div>
	</div>

</body>
</html>
