<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>Gestiune Produse</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
body {
	padding-top: 20px;
}
</style>
</head>
<body>

	<div class="container-fluid">

		<div class="container mb-4">
			<a href="/products" class="btn btn-primary">Produse</a> <a
				href="/components" class="btn btn-outline-primary">Componente</a> <a
				href="/bom/all" class="btn btn-outline-dark ms-2">BOM Global</a>
		</div>
		<div class="row">
			<div class="col-md-12">

				<h3 class="text-primary">Lista Produse</h3>

				<a href="/products/new" class="btn btn-success mb-3">Adaugă
					Produs</a>

				<table class="table table-bordered table-hover">
					<thead class="table-dark">
						<tr>
							<th># ID</th>
							<th>Produs</th>
							<th>Descriere</th>
							<th>Categorie</th>
							<th>Preț</th>
							<th>Stoc</th>
							<th style="width: 200px;">Actiuni</th>
						</tr>
					</thead>
					<tbody>

						<tr th:each="prod : ${products}"
							th:class="${prod.stock < 5} ? 'table-danger' : ''">
							<td th:text="${prod.id}">1</td>
							<td th:text="${prod.name}">Nume</td>
							<td th:text="${prod.description}">Descriere</td>
							<td th:text="${prod.category}">Cat</td>
							<td th:text="${prod.price}">100.0</td>
							<td th:text="${prod.stock}">10</td>

							<td><a th:href="@{/products/bom/{id}(id=${prod.id})}"
								class="btn btn-sm btn-dark"
								title="Configurează Bill of Materials"> BOM </a> <a
								th:href="@{/products/edit/{id}(id=${prod.id})}"
								class="btn btn-sm btn-primary"> Edit </a> <a
								th:href="@{/products/delete/{id}(id=${prod.id})}"
								class="btn btn-sm btn-danger"
								onclick="return confirm('Sigur vrei să ștergi?')"> Delete </a></td>
						</tr>

						<tr th:if="${products.empty}">
							<td colspan="7" class="text-center">Nu există produse.</td>
						</tr>

					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
